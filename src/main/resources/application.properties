spring.application.name=languageflash
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wordflash}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
server.port=${SERVER_PORT:8087}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.config.import=optional:classpath:secret.properties

springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# --- JWT ---
jwt.secret=${JWT_SECRET:dev-only-secret-change-me-0123456789abcdef0123456789abcdef}
# access token: 30 минут
jwt.access-expiration-ms=1800000
# refresh token: 100 лет (вечно)
jwt.refresh-expiration-ms=3153600000000

# --- App ---
app.base-url=${APP_BASE_URL:http://localhost:8087}
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:8087}

# Мок почты: письма пишутся в лог вместо SMTP (для локальной разработки)
app.mail.mock=${APP_MAIL_MOCK:true}
spring.mail.host=${SPRING_MAIL_HOST:smtp.yandex.ru}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
support.email=${SUPPORT_EMAIL:support@languageflash.local}

# --- OAuth providers (пустые значения = провайдер выключен) ---
app.oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
app.oauth.apple.client-id=${OAUTH_APPLE_CLIENT_ID:}
app.oauth.vk.client-id=${OAUTH_VK_CLIENT_ID:}
app.oauth.vk.service-token=${OAUTH_VK_SERVICE_TOKEN:}

# --- Translation ---
# providers: MYMEMORY (бесплатный, без ключа), YANDEX (требует ключ)
app.translation.provider=${TRANSLATION_PROVIDER:MYMEMORY}
app.translation.yandex.api-key=${YANDEX_TRANSLATE_API_KEY:}
app.translation.cache-ttl-days=30

# --- Billing ---
# MOCK: оплата эмулируется (для локальной разработки), YOOKASSA: боевой шлюз
app.billing.provider=${BILLING_PROVIDER:MOCK}

# --- Rate limiting (запросов в минуту) ---
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.auth-per-ip=5
app.rate-limit.parse-per-user=10
app.rate-limit.default-per-user=120
