name: languageflash

services:
  lf-db:
    image: postgres:15
    container_name: lf-db
    environment:
      POSTGRES_DB: ${LF_DB_NAME}
      POSTGRES_USER: ${LF_DB_USER}
      POSTGRES_PASSWORD: ${LF_DB_PASSWORD}
    volumes:
      - lf-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${LF_DB_USER}", "-d", "${LF_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  lf-backend:
    build: .
    container_name: lf-backend
    ports:
      - "127.0.0.1:8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://lf-db:5432/${LF_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${LF_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${LF_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_MAIL_MOCK: "false"
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: "${SPRING_MAIL_PORT}"
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS}
      APP_BASE_URL: ${APP_BASE_URL}
      RATE_LIMIT_ENABLED: "true"
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET}
    depends_on:
      lf-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lf-pgdata:
